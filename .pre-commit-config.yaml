repos:
  # isort: sorts package imports
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args:
          - --profile=black
          - --line-length=100
          - --multi-line=3
          - --trailing-comma
          - --force-grid-wrap=0
          - --use-parentheses
          - --ensure-newline-before-comments

  # black: code formatter
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        args:
          - --line-length=100
          - --target-version=py38
          - --target-version=py39
          - --target-version=py310
          - --skip-string-normalization
          - --exclude=/(\.git|\.hg|\.mypy_cache|\.tox|\.venv|_build|buck-out|build|dist|migrations)/

  # flake8: code linter
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
          # whitespace after '{', whitespace before '}',
          # whitespace before ':', missing whitespace after ':',
          # line break before binary operator, and line too long
          - --extend-ignore=E201,E202,E203,E231,W503,E501
          - --exclude=.git,__pycache__,build,dist,.eggs,*.egg-info,migrations,venv,.venv
          # ignore unused imports when importing rioxarray to use with xarray
          - >-
            --per-file-ignores=
            src/download_crop_masks_and_production_rasters.py:F401,src/utils.py:F401,

  # cleanup hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # max file size: 10MB
        args: ['--maxkb=10000']
